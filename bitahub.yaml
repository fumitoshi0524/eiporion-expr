# BitaHub distributed training job configuration
# Submit with: bita apply -f bitahub.yaml
#
# Storage mounts needed:
#   /mnt/data   -> dataset (FineWeb-Edu)
#   /mnt/models -> TinyLlama-1.1B checkpoint
#   /mnt/output -> checkpoints, logs, results (persistent)
#   /code       -> this git repo (auto-cloned by platform)

apiVersion: bitahub/v1
kind: TrainingJob
metadata:
  name: eiporion-dense
  labels:
    experiment: eiporion-expr
    method: dense

spec:
  # ---- Image ----
  image:
    type: platform
    framework: pytorch
    version: "2.3.0"
    cuda: "12.1"

  # ---- Resources ----
  taskConfig:
    framework: other  # PyTorch native DDP
    roles:
      - name: worker
        resourceType: public
        instanceType: a100-80g  # Adjust based on available types
        nodeCount: 1             # Number of nodes (increase for multi-node)
        # GPU count per node is auto-detected in launch.sh

  # ---- Startup ----
  startupCommand: |
    pip install eiporion swanlab bitsandbytes datasets lm-eval -q
    bash /code/launch.sh --method dense

  # ---- Storage mounts ----
  storageMounts:
    - type: dataset
      name: fineweb-edu
      mountPath: /mnt/data
    - type: model
      name: tinyllama-1.1b
      mountPath: /mnt/models
    - type: fileStorage
      name: eiporion-output
      mountPath: /mnt/output

  # ---- Monitoring ----
  tensorboard:
    enabled: true
    logPath: /mnt/output/tblogs

  # ---- Auto-retry on failure ----
  autoRetry:
    enabled: true
    maxRetries: 3
    retryInterval: 60
    conditions:
      - onFailure
      - onHang:
          timeout: 1800  # 30 min no log = hung

  # ---- Environment ----
  env:
    - name: WANDB_MODE
      value: disabled
    - name: SWANLAB_MODE
      value: local
